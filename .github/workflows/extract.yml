name: Extract main.zip to Root

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract main.zip
        run: |
          echo "بررسی وجود فایل..."
          if [ ! -f "main.zip" ]; then
            echo "⚠️ فایل main.zip در گیت‌هاب نیست!"
            exit 0
          fi
          
          echo "اکسترکت..."
          mkdir -p temp_extract
          unzip -o main.zip -d temp_extract
          mv temp_extract/* . 2>/dev/null || true
          mv temp_extract/.* . 2>/dev/null || true
          rm -rf temp_extract main.zip
          echo "تمام!"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "تغییری نیست."
          else
            git commit -m "Extract main.zip [skip ci]"
            git push || echo "⚠️ خطا در push - شاخه main قفل است!"
          fi
