name: Extract main.zip to Root

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check files
        run: |
          echo "=== محتویات ریشه ==="
          ls -la
          echo ""
          echo "=== بررسی main.zip ==="
          if [ -f "main.zip" ]; then
            echo "✅ main.zip وجود دارد"
            echo "=== محتویات ZIP ==="
            unzip -l main.zip
          else
            echo "❌ main.zip وجود ندارد!"
          fi

      - name: Extract
        run: |
          if [ ! -f "main.zip" ]; then
            echo "⛔ فایل نیست، رد شد"
            exit 0
          fi
          
          mkdir -p temp_extract
          unzip -o main.zip -d temp_extract
          echo "=== محتویات اکسترکت شده ==="
          ls -la temp_extract
          
          cp -r temp_extract/* . 2>/dev/null || true
          cp -r temp_extract/.* . 2>/dev/null || true
          rm -rf temp_extract main.zip
          
          echo "=== محتویات جدید ریشه ==="
          ls -la

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git status
          
          if git diff --staged --quiet; then
            echo "⚠️ تغییری نیست"
          else
            git commit -m "Extract main.zip [skip ci]"
            git push || echo "❌ Push شکست خورد"
          fi
