name: Extract and Commit main.zip

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # اجازه‌ی push دادن

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract main.zip to 'main' folder
        run: |
          mkdir -p main
          unzip main.zip -d main

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add main/
          git commit -m "Extract main.zip to main/" || echo "No changes to commit"
          git push
