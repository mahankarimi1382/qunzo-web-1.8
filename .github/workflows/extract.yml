name: Extract main.zip to Root

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract main.zip
        run: |
          echo "🔍 بررسی main.zip..."
          if [ ! -f "main.zip" ]; then
            echo "❌ فایل main.zip نیست!"
            exit 1
          fi
          
          echo "📦 اکسترکت..."
          unzip -o main.zip
          
          echo "🗑️ حذف main.zip..."
          rm main.zip
          
          echo "✅ فایل‌های جدید:"
          ls -la

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          echo "📊 وضعیت:"
          git status
          
          if git diff --staged --quiet; then
            echo "⚠️ تغییری نیست"
            exit 0
          fi
          
          git commit -m "Extract main.zip to root [skip ci]"
          
          echo "📤 در حال push..."
          git push origin HEAD:main
          
          echo "✅ تمام!"
